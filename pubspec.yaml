name: tutortyper_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.2
  cupertino_icons: ^1.0.8
  
  # Firebase dependencies - all compatible versions
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3
  firebase_storage: ^12.3.2
  firebase_analytics: ^11.3.3
  
  # UI and Animation dependencies
  animations: ^2.0.11
  flutter_animate: ^4.5.2
  awesome_dialog: ^3.2.1
  flutter_neumorphic_plus: ^3.5.0
  flutter_svg: any
  lottie: ^3.3.1
  google_fonts: ^6.3.0
  styled_widget: ^0.4.1
  awesome_snackbar_content: ^0.1.0
  flutter_spinkit: ^5.2.0
  animated_background: ^2.0.0
  
  # New dependencies for chat functionality
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/login_background.json
    - assets/animations/login_view.json
    - assets/animations/Loading.json
    - assets/images/
    - assets/animations/spring_animation.json